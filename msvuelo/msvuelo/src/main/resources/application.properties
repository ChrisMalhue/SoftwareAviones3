spring.application.name=msvuelo
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/db_vuelo?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# URLs de los otros microservicios
services.ubicacion.url=http://localhost:8081
services.avion.url=http://localhost:8082
services.piloto.url=http://localhost:8083
